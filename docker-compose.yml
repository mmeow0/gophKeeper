services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophkeeper
      POSTGRES_USER: gophkeeper
      POSTGRES_PASSWORD: gophkeeper
    ports:
      - "5432:5432"
    volumes:
      - gophkeeper-postgres:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophkeeper -d gophkeeper"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gophkeeper-postgres:

